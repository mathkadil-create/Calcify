name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Create Flutter project
        run: flutter create calcify_build

      - name: Checkout my code
        uses: actions/checkout@v4
        with:
          path: my_code

      - name: Replace main.dart with my code
        run: cp my_code/lib/main.dart calcify_build/lib/main.dart

      - name: Replace pubspec.yaml with my code
        run: cp my_code/pubspec.yaml calcify_build/pubspec.yaml

      - name: Go to project and get dependencies
        working-directory: calcify_build
        run: flutter pub get

      - name: Build APK
        working-directory: calcify_build
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: calcify-apk
          path: calcify_build/build/app/outputs/flutter-apk/app-release.apk
```

**Step 4 — Scroll down → tap "Commit changes"** ✅

